<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title id="titulo-pagina">Atributos — Painel Delícias da Maria</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="../assets/img/favicon.png">
</head>
<body>
<div class="painel">
  <div id="painel-lateral-placeholder"></div>

  <main class="painel-conteudo">
    <div class="painel-cabecalho">
      <div>
        <h1 id="titulo-h1"></h1>
        <p>Esses itens ficam disponíveis para você escolher ao cadastrar um bolo.</p>
      </div>
    </div>

    <div id="alerta-erro" class="alerta alerta-erro" style="display:none;"></div>

    <div class="painel-bloco">
      <h2 id="titulo-adicionar"></h2>
      <form id="form-novo-item" class="linha-form" style="align-items:flex-end;">
        <div class="campo" style="flex:1;">
          <label for="nome-novo">Nome</label>
          <input type="text" id="nome-novo" required placeholder="Ex: Chocolate Belga">
        </div>
        <button type="submit" class="btn btn-rosa" style="height:48px;">Adicionar</button>
      </form>
    </div>

    <div class="painel-bloco">
      <h2 id="titulo-lista"></h2>
      <div id="lista-itens"></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/admin-common.js"></script>
<script>
(async () => {
  const tiposValidos = {
    sabor: { titulo: 'Sabores', singular: 'sabor', emoji: '🍰' },
    cobertura: { titulo: 'Coberturas', singular: 'cobertura', emoji: '🍯' },
    recheio: { titulo: 'Recheios', singular: 'recheio', emoji: '🍫' },
  };

  const params = new URLSearchParams(window.location.search);
  let tipo = params.get('tipo') || 'sabor';
  if (!tiposValidos[tipo]) tipo = 'sabor';
  const info = tiposValidos[tipo];

  await montarSidebar(tipo);

  document.title = `${info.titulo} — Painel Delícias da Maria`;
  document.getElementById('titulo-h1').textContent = `${info.emoji} ${info.titulo}`;
  document.getElementById('titulo-adicionar').textContent = `Adicionar novo ${info.singular}`;
  document.getElementById('titulo-lista').textContent = `Lista de ${info.titulo.toLowerCase()}`;

  let editandoId = null;

  function mostrarErro(msg) {
    const el = document.getElementById('alerta-erro');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function ocultarErro() {
    document.getElementById('alerta-erro').style.display = 'none';
  }

  async function renderizarLista() {
    const itens = await DM.buscarAtributos(tipo);
    const container = document.getElementById('lista-itens');

    if (itens.length === 0) {
      container.innerHTML = `<p style="color:var(--marrom-suave);">Nenhum item cadastrado ainda.</p>`;
      return;
    }

    container.innerHTML = `<div class="lista-simples">${itens.map((item) => {
      if (editandoId === item.id) {
        return `
          <form class="item-simples form-editar-item" data-id="${item.id}" style="gap:10px;">
            <input type="text" class="edit-nome" value="${DM.h(item.nome)}" required style="flex:1; padding:8px 12px; border-radius:8px; border:2px solid var(--rosa-pastel-2);">
            <div class="acoes">
              <button type="submit" class="icone-btn" title="Salvar">💾</button>
              <button type="button" class="icone-btn botao-cancelar" title="Cancelar">✕</button>
            </div>
          </form>`;
      }
      return `
        <div class="item-simples">
          <span>${DM.h(item.nome)}</span>
          <div class="acoes">
            <button type="button" class="icone-btn botao-editar" data-id="${item.id}" title="Editar">✏️</button>
            <button type="button" class="icone-btn botao-excluir" data-id="${item.id}" data-nome="${DM.h(item.nome)}" title="Excluir">🗑️</button>
          </div>
        </div>`;
    }).join('')}</div>`;

    ligarEventos();
  }

  function ligarEventos() {
    document.querySelectorAll('.botao-editar').forEach((btn) => {
      btn.addEventListener('click', () => { editandoId = btn.dataset.id; ocultarErro(); renderizarLista(); });
    });
    document.querySelectorAll('.botao-cancelar').forEach((btn) => {
      btn.addEventListener('click', () => { editandoId = null; renderizarLista(); });
    });
    document.querySelectorAll('.botao-excluir').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Excluir "${btn.dataset.nome}"? Ele também será removido de qualquer bolo que o utilize.`)) return;
        await DM.excluirAtributo(btn.dataset.id);
        renderizarLista();
      });
    });
    document.querySelectorAll('.form-editar-item').forEach((form) => {
      form.addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const nome = form.querySelector('.edit-nome').value.trim();
        if (!nome) { mostrarErro('Digite um nome.'); return; }
        try {
          await DM.editarAtributo(form.dataset.id, tipo, nome);
          ocultarErro();
          editandoId = null;
          renderizarLista();
        } catch (e) {
          mostrarErro(e.message);
        }
      });
    });
  }

  document.getElementById('form-novo-item').addEventListener('submit', async (evento) => {
    evento.preventDefault();
    const nome = document.getElementById('nome-novo').value.trim();
    if (!nome) { mostrarErro('Digite um nome.'); return; }
    try {
      await DM.adicionarAtributo(tipo, nome);
      ocultarErro();
      document.getElementById('nome-novo').value = '';
      renderizarLista();
    } catch (e) {
      mostrarErro(e.message);
    }
  });

  renderizarLista();
})();
</script>
</body>
</html>
