<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Seções do cardápio — Painel Delícias da Maria</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="../assets/img/favicon.png">
</head>
<body>
<div class="painel">
  <div id="painel-lateral-placeholder"></div>

  <main class="painel-conteudo">
    <div class="painel-cabecalho">
      <div>
        <h1>🗂️ Seções do cardápio</h1>
        <p>Crie as seções que organizam o cardápio, como Bolos, Doces, Tortas ou Salgados.</p>
      </div>
    </div>

    <div id="alerta-erro" class="alerta alerta-erro" style="display:none;"></div>

    <div class="painel-bloco">
      <h2>Nova seção</h2>
      <form id="form-nova-categoria" class="linha-form" style="align-items:flex-end;">
        <div class="campo" style="max-width:100px;">
          <label for="emoji-novo">Emoji</label>
          <input type="text" id="emoji-novo" value="🍰" maxlength="4" style="text-align:center; font-size:1.2rem;">
        </div>
        <div class="campo" style="flex:1;">
          <label for="nome-novo">Nome da seção</label>
          <input type="text" id="nome-novo" required placeholder="Ex: Bolos, Doces, Tortas, Salgados...">
        </div>
        <button type="submit" class="btn btn-rosa" style="height:48px;">Adicionar</button>
      </form>
    </div>

    <div class="painel-bloco">
      <h2>Seções cadastradas</h2>
      <div id="lista-categorias"></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/admin-common.js"></script>
<script>
(async () => {
  await montarSidebar('categorias');

  let editandoId = null;

  function mostrarErro(msg) {
    const el = document.getElementById('alerta-erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function ocultarErro() {
    document.getElementById('alerta-erro').style.display = 'none';
  }

  async function renderizarLista() {
    const categorias = await DM.buscarCategorias();
    const container = document.getElementById('lista-categorias');

    if (categorias.length === 0) {
      container.innerHTML = `<p style="color:var(--marrom-suave);">Nenhuma seção criada ainda. Crie a primeira acima — por exemplo "Bolos" — para depois poder cadastrar produtos nela.</p>`;
      return;
    }

    const contagens = await Promise.all(categorias.map((cat) => DM.contarProdutosNaCategoria(cat.id)));

    const itensHtml = categorias.map((cat, indice) => {
      if (editandoId === cat.id) {
        return `
          <form class="item-simples form-editar-categoria" data-id="${cat.id}" style="gap:10px;">
            <input type="text" class="edit-emoji" value="${DM.h(cat.emoji)}" maxlength="4" style="width:60px; text-align:center; padding:8px; border-radius:8px; border:2px solid var(--rosa-pastel-2);">
            <input type="text" class="edit-nome" value="${DM.h(cat.nome)}" required style="flex:1; padding:8px 12px; border-radius:8px; border:2px solid var(--rosa-pastel-2);">
            <div class="acoes">
              <button type="submit" class="icone-btn" title="Salvar">💾</button>
              <button type="button" class="icone-btn botao-cancelar-edicao" title="Cancelar">✕</button>
            </div>
          </form>`;
      }

      const contagem = contagens[indice];
      return `
        <div class="item-simples">
          <span>${DM.h(cat.emoji)} ${DM.h(cat.nome)}
            <span style="font-weight:400; color:var(--marrom-suave); font-size:0.8rem;">
              (${contagem} ${contagem === 1 ? 'produto' : 'produtos'})
            </span>
          </span>
          <div class="acoes">
            <button type="button" class="icone-btn botao-mover" data-id="${cat.id}" data-direcao="cima" title="Mover para cima" ${indice === 0 ? 'disabled' : ''}>⬆️</button>
            <button type="button" class="icone-btn botao-mover" data-id="${cat.id}" data-direcao="baixo" title="Mover para baixo" ${indice === categorias.length - 1 ? 'disabled' : ''}>⬇️</button>
            <button type="button" class="icone-btn botao-editar" data-id="${cat.id}" title="Editar">✏️</button>
            <button type="button" class="icone-btn botao-excluir" data-id="${cat.id}" data-nome="${DM.h(cat.nome)}" title="Excluir">🗑️</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="lista-simples">${itensHtml}</div>`;

    ligarEventosLista();
  }

  function ligarEventosLista() {
    document.querySelectorAll('.botao-mover').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await DM.moverCategoria(btn.dataset.id, btn.dataset.direcao);
        renderizarLista();
      });
    });

    document.querySelectorAll('.botao-editar').forEach((btn) => {
      btn.addEventListener('click', () => {
        editandoId = btn.dataset.id;
        ocultarErro();
        renderizarLista();
      });
    });

    document.querySelectorAll('.botao-cancelar-edicao').forEach((btn) => {
      btn.addEventListener('click', () => {
        editandoId = null;
        renderizarLista();
      });
    });

    document.querySelectorAll('.botao-excluir').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Excluir a seção "${btn.dataset.nome}"?`)) return;
        try {
          await DM.excluirCategoria(btn.dataset.id);
          ocultarErro();
          renderizarLista();
        } catch (e) {
          mostrarErro('Essa seção ainda tem produtos cadastrados. Mova ou exclua esses produtos antes de remover a seção.');
        }
      });
    });

    document.querySelectorAll('.form-editar-categoria').forEach((form) => {
      form.addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const id = form.dataset.id;
        const nome = form.querySelector('.edit-nome').value.trim();
        const emoji = form.querySelector('.edit-emoji').value.trim();

        if (!nome) { mostrarErro('Dê um nome para a seção.'); return; }
        try {
          await DM.editarCategoria(id, nome, emoji);
          ocultarErro();
          editandoId = null;
          renderizarLista();
        } catch (e) {
          mostrarErro(e.message);
        }
      });
    });
  }

  document.getElementById('form-nova-categoria').addEventListener('submit', async (evento) => {
    evento.preventDefault();
    const nome = document.getElementById('nome-novo').value.trim();
    const emoji = document.getElementById('emoji-novo').value.trim();

    if (!nome) { mostrarErro('Dê um nome para a seção.'); return; }
    try {
      await DM.adicionarCategoria(nome, emoji);
      ocultarErro();
      document.getElementById('nome-novo').value = '';
      document.getElementById('emoji-novo').value = '🍰';
      renderizarLista();
    } catch (e) {
      mostrarErro(e.message);
    }
  });

  renderizarLista();
})();
</script>
</body>
</html>
