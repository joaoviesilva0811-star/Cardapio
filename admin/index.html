<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Painel — Delícias da Maria</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="../assets/img/favicon.png">
</head>
<body>
<div class="painel">
  <div id="painel-lateral-placeholder"></div>

  <main class="painel-conteudo">
    <div class="painel-cabecalho">
      <div>
        <h1 id="titulo-saudacao">Olá 👋</h1>
        <p>Aqui está um resumo do cardápio da Delícias da Maria.</p>
      </div>
      <a href="#" id="botao-acao-principal" class="btn btn-rosa">+ Novo produto</a>
    </div>

    <div id="aviso-sem-categoria" class="alerta alerta-erro" style="display:none;">
      Comece criando as seções do seu cardápio (ex: Bolos, Doces, Tortas, Salgados) em
      <a href="categorias.html" style="text-decoration:underline; font-weight:700;">Seções</a>.
      Depois disso você já pode cadastrar os produtos de cada seção.
    </div>

    <div class="cartoes-resumo" id="cartoes-resumo"></div>

    <div class="painel-bloco">
      <h2>Últimos produtos adicionados</h2>
      <div id="bloco-ultimos-produtos"></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/admin-common.js"></script>
<script>
(async () => {
  await montarSidebar('dashboard');

  const admin = await DM.adminLogado();
  document.getElementById('titulo-saudacao').textContent = `Olá, ${admin.nome} 👋`;

  const [categorias, produtos, sabores, coberturas, recheios] = await Promise.all([
    DM.buscarCategorias(),
    DM.buscarProdutos(false),
    DM.buscarAtributos('sabor'),
    DM.buscarAtributos('cobertura'),
    DM.buscarAtributos('recheio'),
  ]);
  const disponiveis = produtos.filter((p) => p.disponivel).length;

  const botaoAcao = document.getElementById('botao-acao-principal');
  if (categorias.length > 0) {
    botaoAcao.textContent = '+ Novo produto';
    botaoAcao.href = 'produto_form.html';
  } else {
    botaoAcao.textContent = '+ Criar primeira seção';
    botaoAcao.href = 'categorias.html';
    document.getElementById('aviso-sem-categoria').style.display = 'block';
  }

  document.getElementById('cartoes-resumo').innerHTML = `
    <div class="cartao-resumo"><div class="numero">${categorias.length}</div><div class="rotulo">Seções criadas</div></div>
    <div class="cartao-resumo"><div class="numero">${produtos.length}</div><div class="rotulo">Produtos cadastrados</div></div>
    <div class="cartao-resumo"><div class="numero">${disponiveis}</div><div class="rotulo">Disponíveis no cardápio</div></div>
    <div class="cartao-resumo"><div class="numero">${sabores.length}</div><div class="rotulo">Sabores cadastrados</div></div>
    <div class="cartao-resumo"><div class="numero">${coberturas.length}</div><div class="rotulo">Coberturas cadastradas</div></div>
    <div class="cartao-resumo"><div class="numero">${recheios.length}</div><div class="rotulo">Recheios cadastrados</div></div>`;

  const ultimos = categorias.length > 0 ? produtos.slice(0, 5) : [];
  const blocoUltimos = document.getElementById('bloco-ultimos-produtos');

  if (ultimos.length === 0) {
    blocoUltimos.innerHTML = `<p style="color:var(--marrom-suave);">
      Nenhum produto cadastrado ainda.
      ${categorias.length > 0 ? `<a href="produto_form.html" style="color:var(--rosa-forte-escuro); font-weight:700;">Cadastre o primeiro</a>.` : ''}
    </p>`;
  } else {
    blocoUltimos.innerHTML = `
      <div class="tabela-scroll">
      <table class="tabela-admin">
        <thead><tr><th>Foto</th><th>Nome</th><th>Seção</th><th>Preço</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${ultimos.map((p) => `
            <tr>
              <td><img class="miniatura" src="${DM.h(DM.urlImagemProduto(p.imagem))}" alt=""></td>
              <td>${DM.h(p.nome)}</td>
              <td><span class="tag lilas">${DM.h(p.categoria_emoji)} ${DM.h(p.categoria_nome)}</span></td>
              <td>${DM.h(DM.formatarPreco(p.preco))}</td>
              <td>${p.disponivel ? '<span class="badge badge-disponivel">Disponível</span>' : '<span class="badge badge-indisponivel">Oculto</span>'}</td>
              <td class="acoes"><a href="produto_form.html?id=${p.id}" class="icone-btn" title="Editar">✏️</a></td>
            </tr>`).join('')}
        </tbody>
      </table>
      </div>`;
  }
})();
</script>
</body>
</html>
