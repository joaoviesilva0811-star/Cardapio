<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Área administrativa — Delícias da Maria</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/img/favicon.png">
</head>
<body>
  <div class="pagina-login">
    <div class="login-caixa">
      <img src="assets/img/logo.jpg" alt="Delícias da Maria" class="logo-login">
      <div class="selo-topo">
        <span class="topo-selo" style="background:var(--rosa-pastel);">Painel administrativo</span>
      </div>
      <h1>Delícias da Maria</h1>
      <p class="subtitulo">Entre para gerenciar o cardápio</p>

      <div class="alerta alerta-erro" id="alerta-erro" style="display:none;"></div>

      <form id="form-login" novalidate>
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username">
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-rosa" style="width:100%;">Entrar</button>
      </form>

      <p style="margin-top:18px; font-size:0.78rem; color:var(--marrom-suave); text-align:center;">
        Use o e-mail e senha cadastrados em Authentication → Users no console do Firebase.
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/store.js"></script>
  <script>
    (async () => {
      if (await DM.estaLogado()) {
        window.location.href = 'admin/index.html';
      }
    })();

    document.getElementById('form-login').addEventListener('submit', async function (evento) {
      evento.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const alerta = document.getElementById('alerta-erro');
      const botao = evento.target.querySelector('button[type="submit"]');

      if (!email || !senha) {
        alerta.textContent = 'Preencha o email e a senha.';
        alerta.style.display = 'block';
        return;
      }

      botao.disabled = true;
      botao.textContent = 'Entrando...';

      if (await DM.tentarLogin(email, senha)) {
        window.location.href = 'admin/index.html';
      } else {
        alerta.textContent = 'Email ou senha incorretos.';
        alerta.style.display = 'block';
        botao.disabled = false;
        botao.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
